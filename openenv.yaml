name: orion-cli
version: "1.0.0"
description: RL-optimised agentic coding assistant OpenEnv environment
entrypoint: server.py

tasks:
  - name: easy_add
    difficulty: easy
    description: Write a Python function called add(a, b) that returns the sum of a and b.
  - name: medium_fix
    difficulty: medium
    description: Fix the buggy.py file where add() returns None instead of a + b.
  - name: hard_refactor
    difficulty: hard
    description: Refactor monolith.py into three functions parse_input, process_data, format_output.

observation_space:
  task_name: str
  task_difficulty: str
  task_prompt: str
  workspace: str
  history: list
  total_reward: float
  steps: int

action_space:
  prompt: str

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state