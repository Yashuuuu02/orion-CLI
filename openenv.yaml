name: orion-cli
version: "1.0.0"
description: RL-optimised agentic coding assistant OpenEnv environment
entrypoint: server.py

tasks:
  - name: fix_tenacity_retry
    difficulty: medium
    description: Fix the retry decorator in retry_utils.py. Contains bugs where it does not check retry_on_exception and returns None instead of raising RetryError.
    seed: 42
    step_budget: 15
  - name: fix_cachetools_ttl
    difficulty: medium
    description: Fix the TTL cache in cache_manager.py. The __getitem__ never checks expiry, and expire() is broken/empty.
    seed: 137
    step_budget: 20
  - name: implement_pybreaker
    difficulty: hard
    description: Implement a circuit breaker compatible with the pybreaker library interface.
    seed: 999
    step_budget: 25
  - name: fix_async_race
    difficulty: hard
    description: Fix the read-modify-write race condition in SharedCounter.increment() within async_worker.py caused by asyncio.sleep(0) yielding control.
    seed: 777
    step_budget: 30

observation_space:
  task_name: str
  task_difficulty: str
  task_prompt: str
  workspace: str
  history: list
  total_reward: float
  steps: int

action_space:
  prompt: str

observation_model: app.models.Observation
action_model: app.models.Action
reward_model: app.models.Reward

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  grader: POST /grader
  baseline: POST /baseline

tools:
  - name: read_file
    description: Read a file from the workspace
  - name: write_file  
    description: Write code to a file
  - name: run_tests
    description: Run grader tests
  - name: list_files
    description: List workspace files
  - name: submit
    description: Submit final solution