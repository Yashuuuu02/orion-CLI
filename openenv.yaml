name: orion-cli
version: "1.0.0"
description: RL-optimised agentic coding assistant OpenEnv environment
entrypoint: server.py

tasks:
  - name: fix_syntax_error
    difficulty: easy
    description: Fix the syntax error in broken.py. The file contains a function with a missing colon after the def statement. The function should be named add(a, b) and return a + b.
    seed: 7
    step_budget: 5
  - name: debug_memory_leak
    difficulty: medium
    description: Fix the memory leak in cache_manager.py. The _cache dict grows unbounded because expired entries are never evicted.
    seed: 42
    step_budget: 15
  - name: fix_retry_logic
    difficulty: hard
    description: Fix the retry decorator in retry_utils.py. Contains bugs with exception filtering, initial backoff value, and swallowing original exceptions.
    seed: 137
    step_budget: 20
  - name: implement_circuit_breaker
    difficulty: hard
    description: Implement a circuit breaker pattern with CLOSED, OPEN, HALF_OPEN states and specific transition rules.
    seed: 999
    step_budget: 25

observation_space:
  task_name: str
  task_difficulty: str
  task_prompt: str
  workspace: str
  history: list
  total_reward: float
  steps: int

action_space:
  prompt: str

observation_model: app.models.Observation
action_model: app.models.Action
reward_model: app.models.Reward

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  grader: POST /grader
  baseline: POST /baseline

tools:
  - name: read_file
    description: Read a file from the workspace
  - name: write_file  
    description: Write code to a file
  - name: run_tests
    description: Run grader tests
  - name: list_files
    description: List workspace files
  - name: submit
    description: Submit final solution